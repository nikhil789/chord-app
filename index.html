<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Chord Trainer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #22c55e;
            --secondary: #eab308;
            --danger: #ef4444;
            --text: #f8fafc;
            --muted: #64748b;
            --input-bg: #334155;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation;
            padding: 10px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin: 0 0 1rem 0;
            font-size: 1.5rem;
            color: var(--primary);
        }

        #round-info {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        #chord-display {
            font-size: clamp(3rem, 12vw, 4.5rem);
            font-weight: 800;
            color: var(--primary);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            margin: 0.5rem 0;
        }

        #note-display {
            font-size: 1.1rem;
            color: var(--secondary);
            min-height: 1.5rem;
            margin: 0.5rem 0 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
        }

        /* Practice Mode Selector */
        .mode-selector {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 1rem;
        }

        .mode-label {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .mode-options {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px 8px;
            border: 2px solid var(--input-bg);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn:hover { border-color: var(--primary); }
        .mode-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #0f172a;
        }

        /* Custom Selection Panel */
        .custom-panel {
            display: none;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 1rem;
            text-align: left;
            transition: opacity 0.3s, max-height 0.3s;
            opacity: 1;
        }

        .custom-panel.show { display: block; }
        .custom-panel.hidden { 
            display: none; 
        }

        .chord-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            max-height: 150px;
            overflow-y: auto;
            padding: 5px;
        }

        .chord-checkbox {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .chord-checkbox input {
            width: 14px;
            height: 14px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .custom-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .custom-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-apply { background: var(--primary); color: #0f172a; }
        .btn-select-all { background: var(--secondary); color: #0f172a; }
        .btn-clear { background: var(--danger); color: white; }

        /* Edit Selection Button (shown when custom mode + stopped) */
        .edit-selection-btn {
            display: none;
            width: 100%;
            padding: 10px;
            margin: 0.5rem 0 1rem;
            background: var(--input-bg);
            border: 2px dashed var(--primary);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .edit-selection-btn.show { display: block; }
        .edit-selection-btn:hover { background: var(--primary); color: #0f172a; }

        /* Control Panel */
        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 15px;
        }

        .interval-label { 
            font-size: 0.7rem; 
            color: var(--muted); 
            grid-column: 1 / span 3; 
            text-align: center;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            color: white;
        }

        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-math { background: #334155; font-size: 1.5rem; }
        
        .action-buttons {
            display: flex;
            gap: 10px;
        }

        #start-stop { flex: 2; background: #16a34a; }
        #start-stop.running { background: var(--danger); }
        #start-stop:disabled { background: var(--muted); }
        
        #reset-btn { flex: 1; background: #475569; }

        .interval-val { font-size: 1.5rem; font-weight: 700; text-align: center; }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            margin-top: 1rem;
            font-size: 0.8rem;
        }

        .stat-item { text-align: center; }
        .stat-value { font-weight: 700; color: var(--primary); font-size: 1.1rem; }
        .stat-label { color: var(--muted); font-size: 0.7rem; }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--input-bg); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        @media (max-width: 380px) {
            .mode-options { flex-direction: column; }
            .mode-btn { min-width: 100%; }
            .chord-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎸 Chord Trainer</h1>
        <div id="round-info">Round: 1 | Chord: 0/24</div>
        <div id="chord-display">READY</div>
        <div id="note-display"></div>

        <!-- Practice Mode Selector -->
        <div class="mode-selector">
            <span class="mode-label">Practice Mode</span>
            <div class="mode-options">
                <button class="mode-btn active" data-mode="all" onclick="setPracticeMode('all')">All Chords</button>
                <button class="mode-btn" data-mode="major" onclick="setPracticeMode('major')">Major Only</button>
                <button class="mode-btn" data-mode="minor" onclick="setPracticeMode('minor')">Minor Only</button>
                <button class="mode-btn" data-mode="custom" onclick="setPracticeMode('custom')">Custom</button>
            </div>
        </div>

        <!-- Edit Selection Button (appears when custom mode + stopped) -->
        <button class="edit-selection-btn" id="edit-selection-btn" onclick="toggleCustomPanel()">
            ✏️ Edit Chord Selection
        </button>

        <!-- Custom Selection Panel -->
        <div class="custom-panel" id="custom-panel">
            <span class="mode-label">Select Chords to Practice</span>
            <div class="chord-grid" id="chord-grid"></div>
            <div class="custom-actions">
                <button class="btn-select-all" onclick="toggleAllChords(true)">All</button>
                <button class="btn-clear" onclick="toggleAllChords(false)">None</button>
                <button class="btn-apply" onclick="applyCustomSelection()">✓ Apply & Hide</button>
            </div>
        </div>

        <!-- Interval Control -->
        <div class="control-panel">
            <div class="interval-label">INTERVAL (SECONDS)</div>
            <button class="btn-math" onclick="changeInterval(-1)">−</button>
            <div class="interval-val" id="time-label">10</div>
            <button class="btn-math" onclick="changeInterval(1)">+</button>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button id="start-stop" onclick="toggleTrainer()">START</button>
            <button id="reset-btn" onclick="resetSession()">RESET</button>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="stat-total">24</div>
                <div class="stat-label">In Deck</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-played">0</div>
                <div class="stat-label">Played</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-mode">All</div>
                <div class="stat-label">Mode</div>
            </div>
        </div>
    </div>

    <script>
        // Chord database
        const chordData = {
            "C Major": "C - E - G", "C# Major": "C# - F - G#", "D Major": "D - F# - A", 
            "D# Major": "D# - G - A#", "E Major": "E - G# - B", "F Major": "F - A - C", 
            "F# Major": "F# - A# - C#", "G Major": "G - B - D", "G# Major": "G# - C - D#", 
            "A Major": "A - C# - E", "A# Major": "A# - D - F", "B Major": "B - D# - F#",
            "C Minor": "C - D# - G", "C# Minor": "C# - E - G#", "D Minor": "D - F - A", 
            "D# Minor": "D# - F# - A#", "E Minor": "E - G - B", "F Minor": "F - G# - C", 
            "F# Minor": "F# - A - C#", "G Minor": "G - A# - D", "G# Minor": "G# - B - D#", 
            "A Minor": "A - C - E", "A# Minor": "A# - C# - F", "B Minor": "B - D - F#"
        };

        // App state
        let chordList = Object.keys(chordData);
        let deck = [];
        let intervalTime = 10;
        let mainTimer = null;
        let noteTimer = null;
        let isRunning = false;
        let chordsPlayed = 0;
        let roundCount = 1;
        let practiceMode = 'all';
        let customSelection = [...chordList];
        let customPanelVisible = true; // Track panel visibility state

        // DOM Elements
        const display = document.getElementById('chord-display');
        const noteDisplay = document.getElementById('note-display');
        const timeLabel = document.getElementById('time-label');
        const startBtn = document.getElementById('start-stop');
        const roundInfo = document.getElementById('round-info');
        const customPanel = document.getElementById('custom-panel');
        const chordGrid = document.getElementById('chord-grid');
        const editSelectionBtn = document.getElementById('edit-selection-btn');
        const statTotal = document.getElementById('stat-total');
        const statPlayed = document.getElementById('stat-played');
        const statMode = document.getElementById('stat-mode');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            renderCustomChordGrid();
            updateStats();
            updateModeButtons();
            updateCustomPanelVisibility();
        });

        // Utility: Shuffle array
        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Filter chords based on practice mode
        function getFilteredChords() {
            switch(practiceMode) {
                case 'major':
                    return chordList.filter(c => c.includes('Major'));
                case 'minor':
                    return chordList.filter(c => c.includes('Minor'));
                case 'custom':
                    return customSelection.filter(c => chordData[c]);
                case 'all':
                default:
                    return [...chordList];
            }
        }

        // Set practice mode
        function setPracticeMode(mode) {
            if (isRunning) stopTrainer();
            
            practiceMode = mode;
            updateModeButtons();
            updateCustomPanelVisibility();
            updateStats();
            saveSettings();
            
            deck = [];
            display.innerText = "READY";
            noteDisplay.innerText = "";
            roundInfo.innerText = `Round: 1 | Chord: 0/${getFilteredChords().length}`;
        }

        // Update mode button styles
        function updateModeButtons() {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === practiceMode);
            });
            statMode.innerText = practiceMode.charAt(0).toUpperCase() + practiceMode.slice(1);
        }

        // Toggle custom panel visibility
        function toggleCustomPanel() {
            customPanelVisible = !customPanelVisible;
            updateCustomPanelVisibility();
        }

        // Update visibility of custom panel and edit button
        function updateCustomPanelVisibility() {
            const isCustomMode = practiceMode === 'custom';
            const shouldShowPanel = isCustomMode && customPanelVisible && !isRunning;
            const shouldShowEditBtn = isCustomMode && !customPanelVisible && !isRunning;
            
            // Hide panel when running, regardless of other settings
            if (isRunning) {
                customPanel.classList.add('hidden');
                editSelectionBtn.classList.remove('show');
                return;
            }
            
            customPanel.classList.toggle('show', shouldShowPanel);
            customPanel.classList.toggle('hidden', !shouldShowPanel);
            editSelectionBtn.classList.toggle('show', shouldShowEditBtn);
        }

        // Render custom chord selection grid
        function renderCustomChordGrid() {
            chordGrid.innerHTML = '';
            
            const sortedChords = [...chordList].sort((a, b) => {
                const aMinor = a.includes('Minor');
                const bMinor = b.includes('Minor');
                if (aMinor !== bMinor) return aMinor - bMinor;
                return a.localeCompare(b);
            });
            
            sortedChords.forEach(chord => {
                const label = document.createElement('label');
                label.className = 'chord-checkbox';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = chord;
                checkbox.checked = customSelection.includes(chord);
                checkbox.onchange = (e) => {
                    if (e.target.checked) {
                        if (!customSelection.includes(chord)) customSelection.push(chord);
                    } else {
                        customSelection = customSelection.filter(c => c !== chord);
                    }
                    saveSettings();
                };
                
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(chord));
                chordGrid.appendChild(label);
            });
        }

        // Toggle all chords in custom selection
        function toggleAllChords(selectAll) {
            customSelection = selectAll ? [...chordList] : [];
            renderCustomChordGrid();
            saveSettings();
        }

        // Apply custom selection
        function applyCustomSelection() {
            if (customSelection.length === 0) {
                alert('Please select at least one chord to practice!');
                return;
            }
            // Hide panel after applying
            customPanelVisible = false;
            updateCustomPanelVisibility();
            setPracticeMode('custom');
            updateStats();
        }

        // Update statistics display
        function updateStats() {
            const filtered = getFilteredChords();
            statTotal.innerText = filtered.length;
            statPlayed.innerText = chordsPlayed;
            statMode.innerText = practiceMode.charAt(0).toUpperCase() + practiceMode.slice(1);
        }

        // Change interval time
        function changeInterval(val) {
            intervalTime = Math.max(3, Math.min(60, intervalTime + val));
            timeLabel.innerText = intervalTime;
            
            if (isRunning) {
                stopTrainer();
                startTrainer();
            }
            saveSettings();
        }

        // Toggle trainer start/stop
        function toggleTrainer() {
            if (practiceMode === 'custom' && customSelection.length === 0) {
                alert('Please select at least one chord in Custom mode!');
                customPanelVisible = true;
                updateCustomPanelVisibility();
                return;
            }
            
            isRunning ? stopTrainer() : startTrainer();
        }

        // Reset session
        function resetSession() {
            stopTrainer();
            deck = [];
            chordsPlayed = 0;
            roundCount = 1;
            display.innerText = "READY";
            noteDisplay.innerText = "";
            roundInfo.innerText = `Round: 1 | Chord: 0/${getFilteredChords().length}`;
            updateStats();
        }

        // Start trainer
        function startTrainer() {
            const filtered = getFilteredChords();
            
            if (filtered.length === 0) {
                alert('No chords selected! Please choose a practice mode or select chords.');
                return;
            }
            
            isRunning = true;
            startBtn.innerText = "STOP";
            startBtn.classList.add('running');
            startBtn.disabled = false;
            
            // Hide custom panel when training starts
            customPanelVisible = false;
            updateCustomPanelVisibility();
            
            if (deck.length === 0) {
                deck = shuffle([...filtered]);
            }
            
            updateStats();
            runCycle();
        }

        // Stop trainer
        function stopTrainer() {
            isRunning = false;
            startBtn.innerText = "START";
            startBtn.classList.remove('running');
            clearTimeout(mainTimer);
            clearTimeout(noteTimer);
            
            // Show edit button when stopped in custom mode
            updateCustomPanelVisibility();
        }

        // Run training cycle
        function runCycle() {
            if (!isRunning) return;

            const filtered = getFilteredChords();
            
            if (deck.length === 0) {
                alert(`✅ Round ${roundCount} Complete!\nStarting Round ${roundCount + 1}...`);
                roundCount++;
                chordsPlayed = 0;
                deck = shuffle([...filtered]);
            }

            const currentChord = deck.pop();
            chordsPlayed++;
            
            display.innerText = currentChord;
            noteDisplay.innerText = ""; 
            roundInfo.innerText = `Round: ${roundCount} | Chord: ${chordsPlayed}/${filtered.length}`;
            updateStats();

            const revealTime = Math.max(1000, (intervalTime - 2) * 1000);
            noteTimer = setTimeout(() => {
                if (isRunning) {
                    noteDisplay.innerText = chordData[currentChord];
                }
            }, revealTime);

            mainTimer = setTimeout(runCycle, intervalTime * 1000);
        }

        // Save settings to localStorage
        function saveSettings() {
            const settings = {
                intervalTime,
                practiceMode,
                customSelection
            };
            localStorage.setItem('chordTrainerSettings', JSON.stringify(settings));
        }

        // Load settings from localStorage
        function loadSettings() {
            try {
                const saved = localStorage.getItem('chordTrainerSettings');
                if (saved) {
                    const settings = JSON.parse(saved);
                    if (settings.intervalTime) {
                        intervalTime = settings.intervalTime;
                        timeLabel.innerText = intervalTime;
                    }
                    if (settings.practiceMode) {
                        practiceMode = settings.practiceMode;
                    }
                    if (settings.customSelection && Array.isArray(settings.customSelection)) {
                        customSelection = settings.customSelection;
                    }
                }
            } catch (e) {
                console.warn('Could not load settings:', e);
            }
        }

        // Handle page visibility
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isRunning) {
                stopTrainer();
            }
        });
    </script>
</body>
</html>
